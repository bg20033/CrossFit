services:
  db:
    image: mysql:8.0
    container_name: standup_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-local-root}
      MYSQL_DATABASE: standup_fitness
      MYSQL_USER: ${MYSQL_USER:-standup_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-local-user}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: standup_api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:5050
      - AllowedHosts=${ALLOWED_HOSTS:-localhost}
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=standup_fitness;User=${MYSQL_USER:-standup_user};Password=${MYSQL_PASSWORD:-change-me-local-user};
      - JwtSettings__SecretKey=${JWT_SECRET:-dev-only-secret-key-change-before-production-standup}
      - JwtSettings__Issuer=StandUpFitness
      - JwtSettings__Audience=StandUpFitnessClient
      - Cors__AllowedOrigins__0=${FRONTEND_ORIGIN:-http://localhost:5180}
    ports:
      - "5050:5050"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5050/api}
    container_name: standup_frontend
    ports:
      - "5180:5180"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
